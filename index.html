<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic-Tac-Toe</title>
    <style>
      :root {
        --line: #334155;
        --bg: #0f172a;
        --cell: #1e293b;
        --cell-hover: #334155;
        --text: #e2e8f0;
        --accent: #38bdf8;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      h1 {
        margin: 0;
        font-size: 2rem;
        letter-spacing: 0.05em;
      }
      #status {
        margin: 0;
        font-size: 1.25rem;
        min-height: 1.5em;
        font-weight: 600;
        color: var(--accent);
      }
      #board {
        display: grid;
        grid-template-columns: repeat(3, 5rem);
        grid-template-rows: repeat(3, 5rem);
        gap: 6px;
        background: var(--line);
        padding: 6px;
        border-radius: 8px;
      }
      .cell {
        font-size: 2.5rem;
        font-weight: 700;
        color: var(--text);
        background: var(--cell);
        border: none;
        border-radius: 4px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s ease;
      }
      .cell:hover:not(:disabled) {
        background: var(--cell-hover);
      }
      .cell:disabled {
        cursor: default;
      }
      .cell:focus-visible {
        outline: 3px solid var(--accent);
        outline-offset: 2px;
      }
      #reset {
        font-size: 1rem;
        font-weight: 600;
        padding: 0.6rem 1.4rem;
        color: var(--bg);
        background: var(--accent);
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      #reset:hover {
        filter: brightness(1.1);
      }
      #reset:focus-visible {
        outline: 3px solid var(--text);
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <h1>Tic-Tac-Toe</h1>
    <p id="status" role="status" aria-live="polite">X's turn</p>
    <div id="board" role="grid" aria-label="Tic-tac-toe board"></div>
    <button id="reset" type="button">Reset game</button>
    <script src="game.js"></script>
  </body>
</html>
